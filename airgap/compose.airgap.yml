name: nodegoat-airgap

services:
  web:
    image: nodegoat-web:1.3.0-airgap
    pull_policy: never
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/nodegoat
    command: >
      sh -c "until nc -z -w 2 mongo 27017; do
      sleep 2; done; echo 'mongo is ready for connections';
      exec node server.js"
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:4.4
    pull_policy: never
    user: mongodb
    expose:
      - 27017
    volumes:
      - nodegoat-mongo-data:/data/db
    restart: unless-stopped

volumes:
  nodegoat-mongo-data:
